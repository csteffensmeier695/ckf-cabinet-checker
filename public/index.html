<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CKF Cabinet Checker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#f5f5f5;color:#111;min-height:100vh}
#app{max-width:1100px;margin:0 auto;padding:24px 20px 60px}
h1{font-size:22px;font-weight:500;margin-bottom:4px}
.subtitle{font-size:13px;color:#666;margin-bottom:20px}

#api-bar{background:#fff;border:1px solid #ddd;border-radius:8px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#api-bar label{font-size:13px;font-weight:500;white-space:nowrap}
#api-key-input{flex:1;min-width:200px;font-size:13px;padding:6px 10px;border:1px solid #ccc;border-radius:6px;font-family:monospace}
#save-key-btn{font-size:12px;padding:6px 14px;background:#111;color:#fff;border:none;border-radius:6px;cursor:pointer}
#key-status{font-size:12px;color:#16a34a}

.upload-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.zone-col{display:flex;flex-direction:column;gap:6px}
.drop-zone{border:1.5px dashed #ccc;border-radius:10px;padding:14px 10px;cursor:pointer;background:#fff;text-align:center;transition:background 0.15s,border-color 0.15s}
.drop-zone:hover,.drop-zone.drag{background:#f0f0f0;border-color:#888}
.dz-icon{font-size:20px;margin-bottom:4px}
.dz-label{font-size:13px;font-weight:500}
.dz-label .optional{font-weight:400;color:#999}
.dz-hint{font-size:11px;color:#999;margin-top:2px}
.file-slot{border:0.5px solid #e0e0e0;border-radius:6px;padding:6px 10px;min-height:36px;background:#fff;display:flex;align-items:center;gap:8px}
.file-slot.empty{background:transparent;border-style:dashed}
.slot-label{font-size:11px;color:#bbb}
.fi{font-size:14px;flex-shrink:0}
.finfo{flex:1;min-width:0}
.fname{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fsize{font-size:10px;color:#999}
.rm{background:none;border:none;cursor:pointer;color:#999;font-size:14px;padding:0 2px;line-height:1;flex-shrink:0}
.rm:hover{color:#333}

#run-btn{width:100%;padding:11px 0;font-size:14px;font-weight:500;border:1.5px solid #111;border-radius:8px;background:#111;color:#fff;cursor:pointer;margin-bottom:20px;transition:opacity 0.15s}
#run-btn:disabled{opacity:0.4;cursor:not-allowed}

#error-box{background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#b91c1c;display:none}

#summary{display:none;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:#fff;border:0.5px solid #e0e0e0;border-radius:8px;padding:10px 12px}
.stat-num{font-size:22px;font-weight:500}
.stat-num.red{color:#dc2626}
.stat-lbl{font-size:11px;color:#666;margin-top:2px}

#results-title{font-size:13px;font-weight:600;letter-spacing:.04em;color:#555;margin-bottom:10px;display:none;text-transform:uppercase}

/* Spreadsheet table */
.sheet-wrap{overflow-x:auto;margin-bottom:24px}
table.sheet{width:100%;border-collapse:collapse;font-size:12px;background:#fff;border:1px solid #ddd;border-radius:8px;overflow:hidden}
table.sheet th{background:#111;color:#fff;padding:8px 12px;text-align:left;font-weight:500;font-size:11px;white-space:nowrap}
table.sheet th.center{text-align:center}
table.sheet td{padding:7px 12px;border-bottom:0.5px solid #eee;vertical-align:top}
table.sheet tr:last-child td{border-bottom:none}
table.sheet tr.match-row td{background:#fff}
table.sheet tr.mismatch-row td{background:#fff8f8}
table.sheet tr.design-row td{background:#fffbf0}
table.sheet tr.na-row td{background:#fafafa;color:#aaa}
.sku-cell{font-weight:600;font-family:monospace;font-size:12px}
.desc-cell{color:#444;max-width:200px}
.src-cell{text-align:center;font-size:14px}
.note-cell{font-size:11px;color:#555;max-width:260px;line-height:1.4}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;white-space:nowrap}
.badge-sku{background:#B5D4F4;color:#0C447C}
.badge-qty{background:#C0DD97;color:#27500A}
.badge-price{background:#FAC775;color:#633806}
.badge-dim{background:#F4C0D1;color:#72243E}
.badge-missing{background:#F7C1C1;color:#791F1F}
.badge-design{background:#E5E7EB;color:#374151}
.badge-ok{background:#D1FAE5;color:#065F46}
.match-icon{font-size:13px}
</style>
</head>
<body>
<div id="app">
  <h1>CKF Cabinet Checker</h1>
  <p class="subtitle">Compare cabinet layouts, price lists, and acknowledgements for accuracy.</p>

  <div id="api-bar">
    <label for="api-key-input">Anthropic API Key</label>
    <input type="password" id="api-key-input" placeholder="sk-ant-..."/>
    <button id="save-key-btn">Save</button>
    <span id="key-status"></span>
    <span style="font-size:11px;color:#999;margin-left:4px">Your key is stored locally and never shared.</span>
  </div>

  <div class="upload-grid" id="upload-grid"></div>
  <button id="run-btn" disabled>Run Accuracy Check</button>
  <div id="error-box"></div>
  <div id="summary"></div>
  <div id="results-title"></div>
  <div id="results-list"></div>
</div>

<script>
const MAX=10;
const ZONES=[
  {id:"layout",label:"Cabinet Layout",icon:"📐",optional:true,hint:".pdf · .png · .jpg",accept:".pdf,.png,.jpg,.jpeg"},
  {id:"pricelist",label:"2020 Price List",icon:"📊",optional:true,hint:".xlsx · .xls · .csv · .pdf · .png",accept:".xlsx,.xls,.csv,.pdf,.png,.jpg,.jpeg"},
  {id:"acknowledgement",label:"Cabinet Acknowledgement",icon:"📋",optional:true,hint:".pdf · .xlsx · .png",accept:".pdf,.xlsx,.xls,.png,.jpg,.jpeg"},
];
const state={layout:[],pricelist:[],acknowledgement:[],apiKey:""};

const saved=localStorage.getItem("ckf_api_key");
if(saved){state.apiKey=saved;document.getElementById("api-key-input").value=saved;document.getElementById("key-status").textContent="✓ Saved";}
document.getElementById("save-key-btn").addEventListener("click",()=>{
  const k=document.getElementById("api-key-input").value.trim();
  if(!k)return;
  state.apiKey=k;localStorage.setItem("ckf_api_key",k);
  document.getElementById("key-status").textContent="✓ Saved";
});

function extIcon(name){
  const n=(name||"").toLowerCase();
  if(n.endsWith(".pdf"))return"📄";
  if(n.match(/\.(png|jpg|jpeg)$/))return"🖼";
  if(n.match(/\.(xlsx|xls)$/))return"📗";
  if(n.endsWith(".csv"))return"📃";
  return"📁";
}

function renderGrid(){
  const grid=document.getElementById("upload-grid");
  grid.innerHTML="";
  ZONES.forEach(z=>{
    const files=state[z.id];
    const col=document.createElement("div");col.className="zone-col";
    const dz=document.createElement("div");dz.className="drop-zone";
    dz.innerHTML=`<div class="dz-icon">${z.icon}</div>
      <div class="dz-label">${z.label}<span class="optional"> (optional)</span></div>
      <div class="dz-hint">${files.length>=MAX?`Max ${MAX} files`:files.length?"drop or click to add more":z.hint}</div>`;
    const inp=document.createElement("input");
    inp.type="file";inp.multiple=true;inp.accept=z.accept;inp.style.display="none";
    inp.addEventListener("change",()=>{addFiles(z.id,[...inp.files]);inp.value="";});
    dz.appendChild(inp);
    dz.addEventListener("click",()=>files.length<MAX&&inp.click());
    dz.addEventListener("dragover",e=>{e.preventDefault();dz.classList.add("drag");});
    dz.addEventListener("dragleave",()=>dz.classList.remove("drag"));
    dz.addEventListener("drop",e=>{e.preventDefault();dz.classList.remove("drag");addFiles(z.id,[...e.dataTransfer.files]);});
    col.appendChild(dz);
    for(let i=0;i<MAX;i++){
      const f=files[i];
      const slot=document.createElement("div");
      slot.className="file-slot"+(f?"":" empty");
      if(f){
        slot.innerHTML=`<span class="fi">${extIcon(f.name)}</span>
          <div class="finfo"><div class="fname" title="${f.name}">${f.name}</div><div class="fsize">${(f.size/1024).toFixed(0)} KB</div></div>
          <button class="rm" data-zone="${z.id}" data-idx="${i}">✕</button>`;
      } else {
        slot.innerHTML=`<span class="slot-label">file ${i+1}</span>`;
      }
      col.appendChild(slot);
    }
    grid.appendChild(col);
  });
  document.querySelectorAll(".rm").forEach(btn=>{
    btn.addEventListener("click",()=>{
      state[btn.dataset.zone].splice(parseInt(btn.dataset.idx),1);
      renderGrid();updateBtn();
    });
  });
}

function addFiles(zid,incoming){
  const ex=state[zid];
  const toAdd=incoming.filter(f=>!ex.some(x=>x.name===f.name&&x.size===f.size)).slice(0,MAX-ex.length);
  state[zid].push(...toAdd);renderGrid();updateBtn();
}

function updateBtn(){
  const hasAny=state.layout.length>0||state.pricelist.length>0||state.acknowledgement.length>0;
  document.getElementById("run-btn").disabled=!hasAny;
}

renderGrid();

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(",")[1]);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

async function buildBlocks(file,role){
  const parts=[];
  const mt=file.type||"";
  if(mt.startsWith("image/")){
    const b64=await fileToBase64(file);
    parts.push({type:"image",source:{type:"base64",media_type:mt,data:b64}});
    parts.push({type:"text",text:`Above is ${role} file: "${file.name}".`});
  } else if(mt==="application/pdf"||file.name.toLowerCase().endsWith(".pdf")){
    const b64=await fileToBase64(file);
    parts.push({type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}});
    parts.push({type:"text",text:`Above is ${role} file: "${file.name}".`});
  } else {
    parts.push({type:"text",text:`File "${file.name}" is a spreadsheet for ${role}.`});
  }
  return parts;
}

document.getElementById("run-btn").addEventListener("click",async()=>{
  const errBox=document.getElementById("error-box");
  errBox.style.display="none";
  document.getElementById("summary").style.display="none";
  document.getElementById("results-title").style.display="none";
  document.getElementById("results-list").innerHTML="";
  if(!state.apiKey){errBox.textContent="Please enter and save your Anthropic API key first.";errBox.style.display="block";return;}
  const btn=document.getElementById("run-btn");
  btn.disabled=true;btn.textContent="Analyzing files…";

  try{
    const content=[];
    const hasLayout=state.layout.length>0;
    const hasPricelist=state.pricelist.length>0;
    const hasAck=state.acknowledgement.length>0;

    if(hasLayout){
      for(const f of state.layout) content.push(...await buildBlocks(f,"Cabinet Layout"));
      content.push({type:"text",text:"--- END LAYOUT ---"});
    }
    if(hasPricelist){
      for(const f of state.pricelist) content.push(...await buildBlocks(f,"2020 Price List"));
      content.push({type:"text",text:"--- END PRICE LIST ---"});
    }
    if(hasAck){
      for(const f of state.acknowledgement) content.push(...await buildBlocks(f,"Cabinet Acknowledgement"));
      content.push({type:"text",text:"--- END ACKNOWLEDGEMENT ---"});
    }

    const sourceNote=`Sources provided: Layout=${hasLayout}, PriceList=${hasPricelist}, Acknowledgement=${hasAck}. For any source not provided, use "N/A" in that column.`;
    content.push({type:"text",text:`Compare all sources and return the JSON report. ${sourceNote}`});

    const system=`You are a cabinet estimating and design accuracy expert for a cabinetry company. Cross-reference all provided documents carefully.

CRITICAL RULES FOR ACCURACY:
1. FILLER SKU NORMALIZATION: Fillers are often listed differently across documents. A filler "WF330_3" (qty 1) means the same as "WF330_1" (qty 3). Normalize filler SKUs by base code (strip trailing quantity suffix) and compare total linear footage/quantity. Do NOT flag as mismatch if totals match.
2. TOE KICK: Toe kick is sold in 8ft lengths. Calculate total linear footage needed from the layout and compare to quantity on price list/ack. Account for one 8ft piece covering approximately 96". Do NOT flag as mismatch if the total footage works out even if SKU format differs.
3. CROWN MOLDING: If crown is marked "optional" on the layout, check if it appears on the price list/ack. If it's on the layout (even as optional) but NOT on any price list or ack, flag it as missing and note it was optional on layout.
4. END PANELS / BASE END SKINS: Check if end panels, finished ends, or base end skins appear on price list/ack but are NOT called out on the floor plan. Flag these as missing from layout.
5. WALL FILLERS: Count wall fillers carefully. Check both sides of each run. Do not miscount based on label position in drawings.
6. OPTIONAL ITEMS: Items marked optional on drawings should be noted — flag if they appear on drawings but not on price list, or vice versa, and note their optional status.
7. Multiple layout versions (e.g. 30" uppers vs 36" uppers): Treat each layout version's SKUs separately. Flag when SKUs differ between versions.
8. If a source was not provided, put "N/A" for that source's columns.

Return ONLY a JSON object (no markdown fences):
{
  "summary": {
    "total_items": number,
    "discrepancies_found": number,
    "sku_mismatches": number,
    "qty_mismatches": number,
    "price_mismatches": number,
    "spec_mismatches": number,
    "design_errors": number
  },
  "items": [
    {
      "sku": "product code or DESIGN",
      "description": "short item description",
      "room": "room name or null",
      "layout_val": "value from layout or N/A if not provided or — if not found",
      "pricelist_val": "value from price list or N/A or —",
      "ack_val": "value from ack or N/A or —",
      "issues": ["sku","qty","price","dim","missing","design"],
      "match": true or false,
      "note": "one sentence max 20 words explaining match or mismatch clearly"
    }
  ]
}
Include ALL items — both matches and mismatches. Matches should have match:true. Only mismatches/issues have match:false. Return only JSON.`;

    const resp=await fetch("/api/check",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({system,messages:[{role:"user",content}]})
    });
    const data=await resp.json();
    if(data.error)throw new Error(data.error.message);
    const raw=data.content.filter(b=>b.type==="text").map(b=>b.text).join("");
    const results=JSON.parse(raw.replace(/```json|```/g,"").trim());
    renderResults(results,{hasLayout,hasPricelist,hasAck});
  } catch(e){
    errBox.textContent=e.message;errBox.style.display="block";
  } finally{
    btn.disabled=false;btn.textContent="Run Accuracy Check";updateBtn();
  }
});

const BADGE_MAP={
  sku:["badge-sku","SKU"],
  qty:["badge-qty","QTY"],
  price:["badge-price","PRICE"],
  dim:["badge-dim","SPEC"],
  missing:["badge-missing","MISSING"],
  design:["badge-design","DESIGN"]
};

function issueIcon(issues,match){
  if(match)return'<span class="match-icon">✅</span>';
  if(!issues||issues.length===0)return'<span class="match-icon">❌</span>';
  return(issues||[]).map(iss=>{
    const[cls,lbl]=BADGE_MAP[iss]||["","?"];
    return`<span class="badge ${cls}">${lbl}</span>`;
  }).join(" ");
}

function renderResults(results,sources){
  const s=results.summary;
  const sumEl=document.getElementById("summary");
  sumEl.style.display="grid";
  sumEl.innerHTML=[
    ["Items reviewed",s.total_items,false],
    ["Discrepancies",s.discrepancies_found,s.discrepancies_found>0],
    ["SKU / qty",(s.sku_mismatches||0)+(s.qty_mismatches||0),(s.sku_mismatches||0)+(s.qty_mismatches||0)>0],
    ["Price / spec",(s.price_mismatches||0)+(s.spec_mismatches||0),(s.price_mismatches||0)+(s.spec_mismatches||0)>0],
    ["Design errors",s.design_errors||0,(s.design_errors||0)>0]
  ].map(([l,v,red])=>`<div class="stat-card"><div class="stat-num${red?" red":""}">${v??0}</div><div class="stat-lbl">${l}</div></div>`).join("");

  const titleEl=document.getElementById("results-title");
  titleEl.style.display="block";
  titleEl.textContent=`Discrepancy list · ${results.items.length} items`;

  // Build spreadsheet
  const listEl=document.getElementById("results-list");
  if(!results.items||results.items.length===0){
    listEl.innerHTML='<div style="background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:16px;text-align:center;font-size:14px;color:#16a34a;font-weight:500">No discrepancies found — all sources match!</div>';
    return;
  }

  const layoutHdr=sources.hasLayout?"Cabinet Layout":"Cabinet Layout (not uploaded)";
  const priceHdr=sources.hasPricelist?"2020 Price List":"2020 Price List (not uploaded)";
  const ackHdr=sources.hasAck?"Cabinet Acknowledgement":"Acknowledgement (not uploaded)";

  const rows=results.items.map(it=>{
    const isMismatch=!it.match;
    const isDesign=(it.issues||[]).includes("design");
    const rowClass=isDesign?"design-row":isMismatch?"mismatch-row":"match-row";
    const badges=issueIcon(it.issues,it.match);
    return`<tr class="${rowClass}">
      <td class="sku-cell">${it.sku||''}</td>
      <td class="desc-cell">${it.description||''}${it.room?`<br><span style="font-size:10px;color:#999">${it.room}</span>`:''}</td>
      <td class="src-cell">${it.layout_val||'—'}</td>
      <td class="src-cell">${it.pricelist_val||'—'}</td>
      <td class="src-cell">${it.ack_val||'—'}</td>
      <td style="text-align:center">${badges}</td>
      <td class="note-cell">${it.note||''}</td>
    </tr>`;
  }).join("");

  listEl.innerHTML=`<div class="sheet-wrap"><table class="sheet">
    <thead><tr>
      <th>SKU</th>
      <th>Description</th>
      <th class="center">${layoutHdr}</th>
      <th class="center">${priceHdr}</th>
      <th class="center">${ackHdr}</th>
      <th class="center">Status</th>
      <th>Notes</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}
</script>
</body>
</html>
